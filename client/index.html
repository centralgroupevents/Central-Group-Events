<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Central Group Events | The Hub of Events. Jersey.</title>
    <meta name="description" content="New Jersey's #1 event promotion agency. We promote 100+ events weekly across North, Central, and South NJ — newsletter, reels, paid ads, SMS blasts, and influencer campaigns." />
    <meta name="keywords" content="NJ event promotion, New Jersey nightlife, event marketing NJ, event promo agency, North NJ events, Central NJ events, South NJ events, nightlife promotion New Jersey" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://centralgroupevents.com/" />

    <!-- Google Search Console ownership verification (backup method; primary is DNS/property) -->
    <meta name="google-site-verification" content="7nmsFUgC9E_-NNd3NQQBanfvWS0-29YC6hWOXcaNh5k" />

    <!-- Open Graph (Facebook + LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://centralgroupevents.com/" />
    <meta property="og:title" content="Central Group Events | The Hub of Events. Jersey." />
    <meta property="og:description" content="We've promoted 100+ events across NJ every week. Newsletter. Reels. Paid Ads. SMS Blasts. Influencers. All in one package." />
    <meta property="og:image" content="https://centralgroupevents.com/og-image.jpg" />
    <meta property="og:image:alt" content="Central Group Events — New Jersey's Social Scene, Amplified." />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Central Group Events" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://centralgroupevents.com/" />
    <meta name="twitter:title" content="Central Group Events | The Hub of Events. Jersey." />
    <meta name="twitter:description" content="We've promoted 100+ events across NJ every week. Newsletter. Reels. Paid Ads. SMS Blasts. Influencers. All in one package." />
    <meta name="twitter:image" content="https://centralgroupevents.com/og-image.jpg" />

    <!-- Performance: preconnect to image CDNs so the first image request doesn't pay
         the DNS+TLS round-trip. Cloudinary hosts all admin-uploaded media; Unsplash + Pixabay
         host hero/decorative imagery referenced in seed data. -->
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://pixabay.com" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png?v=2" />
    <link rel="apple-touch-icon" href="/favicon.png?v=2" />

    <!-- RSS feed for the blog -->
    <link rel="alternate" type="application/rss+xml" title="Central Group Events Blog" href="/blog/rss.xml" />

    <!-- Google Search Console Verification -->
    <meta name="google-site-verification" content="7nmsFUgC9E_-NNd3NQQBanfvWS0-29YC6hWOXcaNh5k" />

    <!-- Theme -->
    <meta name="theme-color" content="#8B2FC9" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
